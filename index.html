<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOTRE NOUVELLE MONNAIE BCC</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
    <img src="images/01_splash_logo.png" class="bg">
</div>

<!-- LOADING -->
<div id="loading" class="screen">
    <img src="images/02_loading.png" class="bg">
    <div class="overlay">
        <div class="loader"></div>
    </div>
</div>

<!-- WELCOME -->
<div id="welcome" class="screen">
    <img src="images/03_welcome.png" class="bg">
    <button class="start-btn" onclick="goTo('login')">Commencer</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
    <img src="images/04_login.png" class="bg">
    <div class="overlay">
        <div class="card">
            <h2>Connexion</h2>
            <input type="text" placeholder="Numéro ou Email">
            <input type="password" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
            <div class="link" onclick="goTo('register')">Créer un compte</div>
        </div>
    </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
    <img src="images/05_register.png" class="bg">
    <div class="overlay">
        <div class="card">
            <h2>Créer un compte</h2>
            <input type="text" placeholder="Nom">
            <input type="text" placeholder="Numéro">
            <input type="password" placeholder="Mot de passe">
            <input type="password" placeholder="Confirmer mot de passe">
            <button onclick="register()">S’inscrire</button>
            <div class="link" onclick="goTo('login')">Déjà un compte ?</div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
